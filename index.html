<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="calculator_div">
            <h1>Calculator</h1>

            <div id="input_div1"></div>
            <div id="input_div2"></div>
            <div id="input_div3"></div>
            <div id="input_div4"></div>

            <div id="total_div"></div>

            <div id="result_div">
                <h2 id="result_text">Total:</h2>
            </div>

            <div id="input_div_inp1">
                <h2 id="days_text">Days</h2>
            </div>
            <div id="input_div_inp2">
                <h2 id="hours_text">Hours</h2>
            </div>
            <div id="input_div_inp3">
                <h2 id="weeks_text">Weeks</h2>
            </div>
            <div id="input_div_inp4">
                <h2 id="money_text">Money</h2>
            </div>

            <input id="input1">
            <input id="input2">
            <input id="input3">
            <input id="input4">
        </div>
    </main>
</body>
<script src="main.js"></script>
</html>
